name: Weekly Directory Query Analysis

on:
  schedule:
    # Every Sunday at 6:00 AM UTC (midnight Central time)
    - cron: '0 6 * * 0'
  workflow_dispatch: {}  # also allow manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet anthropic google-cloud-bigquery google-auth

      - name: Run weekly analyzer
        env:
          GA4_BIGQUERY_PROJECT: ${{ secrets.GA4_BIGQUERY_PROJECT }}
          GA4_BIGQUERY_DATASET: ${{ secrets.GA4_BIGQUERY_DATASET }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python scripts/weekly_analyzer.py

      - name: Check for changes
        id: changes
        run: |
          git config user.name "DIH Bot"
          git config user.email "bot@dialedin.health"
          git add data/click_signals.json data/popular_queries.json data/synonyms.json data/weekly_summary.md
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Weekly analysis: ranking signals + synonym proposals"
          title: "Weekly DIH analysis · ${{ github.run_number }}"
          body-path: data/weekly_summary.md
          branch: weekly-analysis-${{ github.run_number }}
          delete-branch: true
          add-paths: |
            data/click_signals.json
            data/popular_queries.json
            data/synonyms.json
            data/weekly_summary.md
