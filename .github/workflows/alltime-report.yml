name: All-Time Directory Query Report

on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet google-cloud-bigquery google-auth

      - name: Build and email the all-time report
        env:
          GA4_BIGQUERY_PROJECT: ${{ secrets.GA4_BIGQUERY_PROJECT }}
          GA4_BIGQUERY_DATASET: ${{ secrets.GA4_BIGQUERY_DATASET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python scripts/alltime_report.py
