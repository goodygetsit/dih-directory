name: Static Directory Build

on:
  push:
    branches: [main]
    paths:
      - 'providers.json'
  workflow_dispatch:
    inputs:
      enrich_missing_about:
        description: "Generate missing provider About text with Claude before build"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      enrich_limit:
        description: "Maximum providers to enrich in this run"
        required: true
        default: "5"
      upload_to_cloudflare:
        description: "Upload generated KV entries to Cloudflare"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enrich missing About text
        if: ${{ github.event_name == 'push' || github.event.inputs.enrich_missing_about == 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENRICH_LIMIT: ${{ github.event.inputs.enrich_limit || '5' }}
        run: npm run enrich:claude -- --missing-about --limit "$ENRICH_LIMIT"

      - name: Commit enrichment
        if: ${{ github.event_name == 'push' || github.event.inputs.enrich_missing_about == 'true' }}
        run: |
          if git diff --quiet -- data/enriched.json; then
            echo "No enrichment changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/enriched.json
          git commit -m "Enrich missing provider About text"
          git push

      - name: Build static directory
        env:
          DIH_SITE_ORIGIN: https://www.dialedin.health
          DIH_DIRECTORY_BASE: /directory
        run: npm run build:static

      - name: Dry-run KV upload
        run: npm run upload:kv:dry -- --prune

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dih-production-directory
          path: dist-kv

      - name: Upload to Cloudflare KV
        if: ${{ github.event_name == 'push' || github.event.inputs.upload_to_cloudflare == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.DIH_PROD_KV_NAMESPACE_ID }}
        run: npm run upload:kv -- --prune
