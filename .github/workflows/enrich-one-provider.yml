name: Enrich One Provider

on:
  workflow_dispatch:
    inputs:
      provider_slug:
        description: "Provider slug to enrich"
        required: true
        default: "best-care-pet-hospital"
      upload_to_cloudflare:
        description: "Upload generated KV entries to Cloudflare"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enrich provider
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run enrich:claude -- --only "${{ inputs.provider_slug }}" --missing-about --limit 1

      - name: Commit enrichment
        run: |
          if git diff --quiet -- data/enriched.json; then
            echo "No enrichment changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/enriched.json
          git commit -m "Enrich ${{ inputs.provider_slug }} provider text"
          git push

      - name: Build static directory
        env:
          DIH_SITE_ORIGIN: https://www.dialedin.health
          DIH_DIRECTORY_BASE: /directory
        run: npm run build:static

      - name: Dry-run KV upload
        run: npm run upload:kv:dry

      - name: Upload to Cloudflare KV
        if: ${{ inputs.upload_to_cloudflare == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.DIH_PROD_KV_NAMESPACE_ID }}
        run: npm run upload:kv
